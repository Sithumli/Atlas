syntax = "proto3";

package atlas.v1;

option go_package = "github.com/Sithumli/atlas/proto/atlasv1;atlasv1";

// ---------------------------------------------------------------------------
// Client-facing KV service
// ---------------------------------------------------------------------------

service KV {
  rpc Get        (GetRequest)        returns (GetResponse);
  rpc Put        (PutRequest)        returns (PutResponse);
  rpc Append     (AppendRequest)     returns (AppendResponse);
}

message GetRequest {
  string key        = 1;
  int32  config_num = 2;
  int64  client_id  = 3;
  int64  request_id = 4;
}

message GetResponse {
  Err    err   = 1;
  string value = 2;
}

message PutRequest {
  string key        = 1;
  string value      = 2;
  int32  config_num = 3;
  int64  client_id  = 4;
  int64  request_id = 5;
}

message PutResponse    { Err err = 1; }

message AppendRequest {
  string key        = 1;
  string value      = 2;
  int32  config_num = 3;
  int64  client_id  = 4;
  int64  request_id = 5;
}

message AppendResponse { Err err = 1; }

enum Err {
  OK            = 0;
  ERR_NO_KEY    = 1;
  WRONG_LEADER  = 2;
  WRONG_GROUP   = 3;
  NOT_READY     = 4;
  TIMEOUT       = 5;
}

// ---------------------------------------------------------------------------
// Shard controller configuration service
// ---------------------------------------------------------------------------

service ShardCtrler {
  rpc Join  (JoinRequest)  returns (CtrlerResponse);
  rpc Leave (LeaveRequest) returns (CtrlerResponse);
  rpc Move  (MoveRequest)  returns (CtrlerResponse);
  rpc Query (QueryRequest) returns (CtrlerResponse);
}

message Group {
  int32           gid     = 1;
  repeated string servers = 2;
}

message Config {
  int32           num      = 1;
  repeated int32  shards   = 2;   // length == NShards
  repeated Group  groups   = 3;
}

message JoinRequest   { repeated Group groups = 1; int64 client_id = 2; int64 request_id = 3; }
message LeaveRequest  { repeated int32 gids   = 1; int64 client_id = 2; int64 request_id = 3; }
message MoveRequest   { int32 shard = 1; int32 gid = 2;  int64 client_id = 3; int64 request_id = 4; }
message QueryRequest  { int32 num   = 1; }

message CtrlerResponse {
  Err    err    = 1;
  Config config = 2; // populated on Query
}
